        const playSynthJam = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const now = ctx.currentTime;

                const r = (min, max) => Math.random() * (max - min) + min;
                const types = ['sine', 'square', 'sawtooth', 'triangle'];
                const getRandomType = () => types[Math.floor(Math.random() * types.length)];

                const bassOsc = ctx.createOscillator();
                const bassGain = ctx.createGain();
                
                bassOsc.type = getRandomType();
                const startFreq = r(80, 400);
                const endFreq = r(20, 60);
                const bassDuration = r(1.0, 3.0);
                
                bassOsc.frequency.setValueAtTime(startFreq, now);
                bassOsc.frequency.exponentialRampToValueAtTime(endFreq, now + bassDuration - 0.2);
                
                bassGain.gain.setValueAtTime(0, now);
                bassGain.gain.linearRampToValueAtTime(r(0.3, 0.6), now + 0.1);
                bassGain.gain.exponentialRampToValueAtTime(0.01, now + bassDuration);
                
                bassOsc.connect(bassGain);
                bassGain.connect(ctx.destination);
                bassOsc.start(now);
                bassOsc.stop(now + bassDuration);

                const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
                const numBlips = Math.floor(r(6, 20)); 
                
                for (let i = 0; i < numBlips; i++) {
                    const blipOsc = ctx.createOscillator();
                    const blipGain = ctx.createGain();
                    
                    blipOsc.type = getRandomType();
                    const f = scale[Math.floor(Math.random() * scale.length)];
                    
                    const timeOffset = now + r(0.1, bassDuration); 
                    const blipDuration = r(0.05, 0.25);
                    
                    blipOsc.frequency.setValueAtTime(f, timeOffset);
                    
                    if (Math.random() > 0.7) {
                        blipOsc.frequency.exponentialRampToValueAtTime(f * r(0.5, 2), timeOffset + blipDuration);
                    }
                    
                    blipGain.gain.setValueAtTime(0, timeOffset);
                    blipGain.gain.linearRampToValueAtTime(r(0.05, 0.15), timeOffset + blipDuration * 0.1);
                    blipGain.gain.exponentialRampToValueAtTime(0.01, timeOffset + blipDuration);
                    
                    blipOsc.connect(blipGain);
                    blipGain.connect(ctx.destination);
                    blipOsc.start(timeOffset);
                    blipOsc.stop(timeOffset + blipDuration);
                }
            } catch (e) {
                console.warn("Audio synthesis not supported or blocked by browser.", e);
            }
        };

        const TerminalText = ({ line, onCommand }) => {
            const { type, text, data } = line;

            const escapeHtml = (unsafe) => {
                return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
            };

            if (type === 'system') return <div className="text-gray-500 my-1 font-semibold">{text}</div>;
            if (type === 'error') return <div className="text-red-500 my-1">{text}</div>;

            const renderFormattedText = (rawText) => {
                const parts = rawText.split(/(```[\s\S]*?```)/g);
                return parts.map((part, i) => {
                if (part.startsWith('```') && part.endsWith('```')) {
                    let code = part.substring(3, part.length - 3).replace(/^.*\n/, ''); 
                    return (
                    <div key={i} className="bg-[#111] text-emerald-300 p-3 my-2 rounded font-mono border border-[#333] whitespace-pre-wrap overflow-x-auto">
                        {code}
                    </div>
                    );
                } else {
                    let safePart = escapeHtml(part);
                    let html = safePart
                    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" class="text-emerald-300 hover:text-emerald-100 hover:bg-emerald-900/30 underline decoration-emerald-500/50 underline-offset-4 transition-colors">$1</a>')
                    .replace(/\*\*(.*?)\*\*/g, '<span class="text-white font-bold">$1</span>')
                    .replace(/\*(.*?)\*/g, '<span class="text-gray-300 italic">$1</span>')
                    .replace(/`(.*?)`/g, '<span class="text-yellow-200 bg-gray-800 px-1 rounded">$1</span>');

                    return <span key={i} dangerouslySetInnerHTML={{ __html: html }} className="whitespace-pre-wrap leading-relaxed" />;
                }
                });
            };

            return <div className="text-emerald-400 my-2">{renderFormattedText(text)}</div>;

                }

                if (lowerCmd === 'synth' || lowerCmd === 'jam') {
                    playSynthJam();
                    setLines(prev => [
                        ...prev, 
                        { 
                            id: generateId(), 
                            type: 'output', 
                            text: `Patching virtual cables...\nWarming up analog oscillators...\n[||||||||||||||||||||||||] 100%\n\n♪┏(・o･)┛♪┗ ( ･o･) ┓♪\n\n*bzzzt... wub wub wub... screech...*` 
                        },
                        { id: generateId(), type: 'menu', data: HELP_MENU_DATA }
                    ]);
                    return;
                }

                setLines(prev => [
                    ...prev, 
                    { 
                        id: generateId(), 
                        type: 'error', 
                        text: `Command not found: ${trimmedCmd}. Please click an option below:` 
                    },
                    { id: generateId(), type: 'menu', data: HELP_MENU_DATA }
                ]);
            };

            const handleKeyDown = (e) => {
                if (e.ctrlKey && e.key === 'l') { e.preventDefault(); setLines([{ id: generateId(), type: 'menu', data: HELP_MENU_DATA }]); return; }
                if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    const newIndex = historyIndex + 1;
                    setHistoryIndex(newIndex);
                    setInput(commandHistory[commandHistory.length - 1 - newIndex]);
                }
                } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    const newIndex = historyIndex - 1;
                    setHistoryIndex(newIndex);
                    setInput(commandHistory[commandHistory.length - 1 - newIndex]);
                } else if (historyIndex === 0) {
                    setHistoryIndex(-1);
                    setInput('');
                }
                }
            };

            return (
                <div 
                className="h-full w-full bg-[#050505] text-emerald-500 font-mono p-4 sm:p-6 overflow-hidden flex flex-col relative text-sm sm:text-base selection:bg-emerald-500 selection:text-black"
                onClick={handleContainerClick}
                >
                <div className="absolute inset-0 pointer-events-none bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_4px,3px_100%] z-50 opacity-[0.15]"></div>
                
                <div className="flex-1 overflow-y-auto pb-8 scrollbar-hide z-10 w-full relative">
                    
                    {/* YENİ: 100% Okunabilir ve Gerçek CSS 3D Gölgeli Logo */}
                    <div className="absolute top-0 right-2 lg:right-8 hidden md:block text-emerald-500 font-bold select-none opacity-90 pointer-events-none drop-shadow-[0_0_12px_rgba(16,185,129,0.3)]">
                        <pre className="text-[10px] lg:text-xs leading-[1.1] font-mono whitespace-pre"
                             style={{ textShadow: '1px 1px 0px #065f46, 2px 2px 0px #065f46, 3px 3px 0px #064e3b, 4px 4px 0px #064e3b' }}>{`
 ____   ___  _   _ ___ _  __
/ ___| / _ \\| \\ | |_ _| |/ /
\\___ \\| | | |  \\| || || ' / 
 ___) | |_| | |\\  || || . \\ 
|____/ \\___/|_| \\_|___|_|\\_\\
                            
 ____  _   _ _____ ___ _  __
| __ )| | | |_   _|_ _| |/ /
|  _ \\| | | | | |  | || ' / 
| |_) | |_| | | |  | || . \\ 
|____/ \\___/  |_| |___|_|\\_\\
                        `}</pre>
                    </div>

                    {lines.map(line => <TerminalText key={line.id} line={line} onCommand={handleCommand} />)}

                    {!isBooting && (
                        <div className="mt-2">
                            {!isMobile ? (
                                <form onSubmit={e => { e.preventDefault(); handleCommand(input); setInput(''); }} className="flex items-start sm:items-center">
                                    <span className="text-emerald-500 font-bold mr-2 whitespace-nowrap mt-[2px] sm:mt-0">guest@sonik-butik:~$</span>
                                    <input
                                    ref={inputRef}
                                    type="text"
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                    onKeyDown={handleKeyDown}
                                    disabled={isBooting}
                                    placeholder="Type a command or click an option above..."
                                    className="flex-1 bg-transparent border-none outline-none text-gray-200 font-mono caret-emerald-500 w-full min-w-0 placeholder:text-gray-700 placeholder:italic"
                                    autoComplete="off" spellCheck="false" autoFocus={!isMobile}
                                    />
                                </form>
                            ) : (
                                <div className="flex items-center">
                                    <span className="text-emerald-500 font-bold mr-2 whitespace-nowrap">guest@sonik-butik:~$</span>
                                    <span className="w-2 h-4 bg-emerald-500 animate-pulse inline-block"></span>
                                </div>
                            )}
                        </div>
                    )}
                    <div ref={bottomRef} className="h-4" />
                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
